[build]
# Build natively for this Windows host. The MSVC C++ toolchain (link.exe +
# Windows SDK) is not installed here, so we target the GNU ABI and link with
# the mingw-w64 GCC installed via scoop (see the windows-gnu section below).
target = "x86_64-pc-windows-gnu"
target-dir = "../corrosion-target"

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "link-self-contained=yes"]

[target.x86_64-unknown-linux-gnu]
linker = "gcc"

[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"
