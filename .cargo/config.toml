[build]
target = "x86_64-unknown-linux-musl"
target-dir = "../corrotion-target"

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = ["-C", "link-self-contained=yes"]

# Windows cross-compile target for FL Studio on Windows.
# Plugin bundles produced here are the user's primary creative artifacts.
# The Linux-gnu target is used by the headless REAPER QA bot.
[target.x86_64-pc-windows-gnu]
linker = "x86_64-w64-mingw32-gcc"

# DEFERRED: Windows linker support depends on x86_64-w64-mingw32-gcc being present in this environment.
